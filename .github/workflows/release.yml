name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Build
        run: |
          xcodebuild -scheme Kasumi \
            -configuration Release \
            -derivedDataPath build \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package app
        run: |
          APP_PATH=$(find build -name "Kasumi.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Kasumi.app not found"
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          ditto -c -k --keepParent "$APP_PATH" Kasumi.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: Kasumi.zip
          generate_release_notes: true
          draft: false
          prerelease: false
